<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>文章详情</title><link rel="stylesheet" href="style.css"/></head><body><header class="topbar"><div class="container nav"><div class="logo">熊猫哥情感</div><nav><a href="index.html">返回首页</a><a href="write.html">写文章</a></nav></div></header><main class="container detail" id="detail"></main><script>function esc(s=''){return s.replace(/[&<>\"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m]));}(async()=>{const id=new URLSearchParams(location.search).get('id');const p=await fetch('posts.json?_='+Date.now()).then(r=>r.json());const a=(p.items||[]).find(x=>x.id===id);const el=document.getElementById('detail');if(!a){el.innerHTML='<h2>文章不存在</h2>';return;}el.innerHTML=`${a.cover?`<img class="cover-lg" src="${esc(a.cover)}" alt="cover">`:''}<h1>${esc(a.title)}</h1><p class="meta">${esc(a.date||'')}</p><div class="article-body">${esc(a.content||'').replace(/\n/g,'<br>')}</div>`;})();</script></body></html>
