<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>写文章</title><link rel="stylesheet" href="style.css"/></head><body><div class="container" style="padding:24px 20px"><h1>发文章</h1><p>像公众号一样写：填封面、标题、正文，点发布。</p><div class="card"><label>GitHub Token</label><input id="token" placeholder="github_pat_xxx" style="width:100%"><label>标题</label><input id="title" style="width:100%"><label>封面图URL</label><input id="cover" placeholder="https://..." style="width:100%"><label>正文</label><textarea id="content" style="width:100%;height:260px" placeholder="直接写正文..."></textarea><button class="btn" id="pubBtn">发布文章</button><p id="msg" class="meta"></p><p class="meta">发布后访问：<a href="index.html">首页</a> / <a href="article.html">文章页</a></p></div></div><script src="write.js"></script></body></html>
