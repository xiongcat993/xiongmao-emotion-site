<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熊猫哥情感｜课程站</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <div class="logo" id="siteLogo">熊猫哥情感</div>
      <nav>
        <a href="#about">自我介绍</a>
        <a href="#blog">课程目录</a>
        <a href="#courses">课程</a>
        <a href="admin.html">后台</a>
      </nav>
    </div>
  </header>

  <section class="hero container" id="about">
    <div>
      <h1 id="heroTitle">技术创作 + 课程分享</h1>
      <p id="heroDesc"></p>
      <div class="chips" id="heroChips"></div>
    </div>
    <div class="card">
      <h3>站点定位</h3>
      <ul id="heroBullets"></ul>
    </div>
  </section>

  <section class="container" id="blog">
    <h2>📚 课程目录</h2>
    <div class="grid posts" id="postList"></div>
  </section>

  <section class="container" id="courses">
    <div class="row">
      <h2>🎓 课程资源</h2>
      <div>
        <select id="categoryFilter"><option value="all">全部分类</option></select>
        <select id="priceFilter"><option value="all">全部价格</option></select>
      </div>
    </div>
    <div class="grid courses" id="courseList"></div>
  </section>

  <footer><div class="container" id="footerText">© 2026 熊猫哥情感</div></footer>

  <script src="app.js"></script>
</body>
</html>
