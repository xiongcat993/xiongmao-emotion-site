<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>后台编辑</title><link rel="stylesheet" href="style.css"/></head><body><div class="container" style="padding:24px 20px"><h1>后台编辑（可视化）</h1><p>填完后点“保存到 GitHub 并发布”。</p><div class="card"><label>GitHub Token</label><input id="token" placeholder="ghp_xxx" style="width:100%"><p class="meta">在 GitHub → Settings → Developer settings → Personal access tokens 创建，权限给 repo。</p><label>站点名称</label><input id="siteName" style="width:100%"><label>主标题</label><input id="heroTitle" style="width:100%"><label>简介</label><textarea id="heroDesc" style="width:100%;height:80px"></textarea><label>课程目录（JSON数组）</label><textarea id="catalogs" style="width:100%;height:140px"></textarea><label>课程资源（JSON数组）</label><textarea id="courses" style="width:100%;height:220px"></textarea><button class="btn" id="saveBtn">保存到 GitHub 并发布</button><p id="msg" class="meta"></p></div></div><script src="admin.js"></script></body></html>
