<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>熊猫哥情感｜课程详情</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar"><div class="container nav"><div class="logo">熊猫哥情感</div><nav><a href="index.html">返回首页</a></nav></div></header>
<main class="container detail" id="detail"></main>
<script>
(async()=>{
  const id = new URLSearchParams(location.search).get('id');
  const res = await fetch('data.json?_=' + Date.now());
  const data = await res.json();
  const c = (data.courses||[]).find(x=>x.id===id);
  const el = document.getElementById('detail');
  if(!c){ el.innerHTML='<h2>课程不存在</h2>'; return; }
  el.innerHTML = `<h1>${c.title}</h1><p class="meta">分类：${c.category} ｜ 类型：${c.priceType} ｜ 价格：${c.price}</p><p>${c.summary||''}</p><h3>课程内容</h3><ul>${(c.outline||[]).map(i=>`<li>${i}</li>`).join('')}</ul><h3>适合人群</h3><p>${c.forWho||''}</p>`;
})();
</script>
</body>
</html>
